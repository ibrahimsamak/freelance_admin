<div class="container-fluid">
    <div class="row">
        <div class="col-sm-12 col-xl-12">
            <div class="row">
                <div class="col-sm-12">
                    <div class="card">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="form-group">
                                        <label for="country_id">{{'Choose' | translate}}</label>
                                        <div class="input-group">
                                            <select name="status_id" id="status_id" #status_id="ngModel"
                                                [(ngModel)]="searchObject.status_id" class="form-control"
                                                (change)="changeStatus()">
                                                <option value="new">{{'ST_New' | translate}}</option>
                                                <option value="accepted">{{'ST_Accept' | translate}}</option>
                                                <option value="started">{{'ST_Progress' | translate}}</option>
                                                <option value="updated">{{'ST_Updated' | translate}} </option>
                                                <option value="finished">{{'ST_Done' | translate}}</option>
                                                <option value="rated">{{'ST_Rated' | translate}}</option>
                                                <option value="canceled_by_driver">{{'ST_Employee' | translate}}</option>
                                                <option value="canceled_by_user">{{'ST_User' | translate}}</option>
                                                <option value="canceled_by_admin">{{'ST_Admin' | translate}}</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row mt-2 mr-3 ml-3">
                                <button type="button" class="btn btn-outline-info btn-sm"
                                    (click)="search()">{{'Search' | translate}}</button>&nbsp;
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<div class="container-fluid">
    <div class="row">
        <div class="col-xl-12">
            <div class="card">
                <div class="card-header">
                    <h5>
                        {{'SixMonth' | translate}}
                    </h5>
                </div>
                <div class="card-body">
                    <div class="map-js-height">
                        <agm-map [latitude]="lat_m1" [longitude]="lng_m1" [zoom]="zoom_m1" [scrollwheel]="true" [disableDoubleClickZoom]="false" [mapDraggable]="true" [zoomControl]="true" [mapTypeControl]="true" [mapTypeId]="'hybrid'">
                            <agm-marker *ngFor="let m of markers; let i = index" [latitude]="m.lat" [longitude]="m.lng" [label]="m.label">
                                <agm-info-window>
                                    {{m.nameData}}
                                </agm-info-window>
                            </agm-marker>
                        </agm-map>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
